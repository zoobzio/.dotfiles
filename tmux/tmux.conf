# Default shell
set -g default-shell /usr/bin/fish

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Quality of life
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix: Ctrl-Space
unbind C-b
set -g prefix 'C-\'
bind 'C-\' send-prefix

# Pane splitting (keep cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New window keeps cwd
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Status bar (cyberdream) ---
set -g status-position bottom
set -g status-style "bg=#16181a,fg=#ffffff"
set -g status-left "#[bg=#5ea1ff,fg=#16181a,bold] #S #[bg=#16181a] "
set -g status-left-length 30
set -g status-right "#[fg=#3c4048]│ #[fg=#5ef1ff]%H:%M "
set -g window-status-format "#[fg=#3c4048] #I:#W "
set -g window-status-current-format "#[fg=#5eff6c,bold] #I:#W "
set -g pane-border-style "fg=#3c4048"
set -g pane-active-border-style "fg=#5ea1ff"
set -g message-style "bg=#16181a,fg=#f1ff5e"
